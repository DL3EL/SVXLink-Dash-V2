[Service]
# Kurze Gedenksekunde für den I2S-Bus
ExecStartPre=/bin/sleep 2

# Wir nutzen den Namen 'Audio' - das ist am sichersten gegen Hardware-Wechsel
ExecStartPre=/usr/bin/amixer -D hw:Audio sset 'Lineout' unmute
#ExecStartPre=/usr/bin/amixer -D hw:Audio sset 'Lineout' 100%
#ExecStartPre=/usr/bin/amixer -D hw:Audio sset 'PCM' 90%
ExecStartPre=/usr/bin/amixer -D hw:Audio sset 'Capture Mux' LINE_IN
ExecStartPre=/bin/sleep 2
ExecStartPre=/usr/bin/amixer -D hw:Audio sset 'Capture' 56% cap
